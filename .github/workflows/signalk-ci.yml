# SignalK Plugin CI — calls the shared reusable workflow from
# SignalK/signalk-server, which tests the plugin across Linux (x64/arm64),
# macOS and Windows (Node 22 + 24) and validates package.json, exports,
# schema and the start/stop lifecycle. Results show up on the plugin's
# App Store "Indicators" tab.
#
# armv7 (Cerbo GX, QEMU) and the SignalK server integration test are
# opt-in via the manual workflow_dispatch trigger.

name: SignalK Plugin CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:
    inputs:
      enable-armv7:
        description: Run armv7 (Cerbo GX) tests via QEMU
        required: false
        default: true
        type: boolean
      enable-signalk-integration:
        description: Start SignalK server and install plugin for integration testing
        required: false
        default: true
        type: boolean
      signalk-server-versions:
        description: 'JSON array of signalk-server versions for integration testing, e.g. ["2.23.0","latest"]'
        required: false
        default: '["latest"]'
        type: string

jobs:
  # ── Automatic runs (push / pull request) ──────────────────
  test-plugin-auto:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
    with:
      test-command: npm test
      build-command: npm run build --if-present
      node-versions: '["22", "24"]'
      enable-armv7: false
      enable-signalk-integration: false

  # ── Manual runs (workflow_dispatch, extended coverage) ────
  test-plugin-manual:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    uses: SignalK/signalk-server/.github/workflows/plugin-ci.yml@master
    with:
      test-command: npm test
      build-command: npm run build --if-present
      node-versions: '["22", "24"]'
      enable-armv7: ${{ inputs.enable-armv7 }}
      enable-signalk-integration: ${{ inputs.enable-signalk-integration }}
      signalk-server-versions: ${{ inputs.signalk-server-versions }}
